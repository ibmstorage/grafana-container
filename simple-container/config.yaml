          # shellcheck disable=SC1091
          source "${DEVSECOPS_SCRIPT_LIBRARY_DIR}/utils/environment-utilities.sh"
          export-properties "GLOBAL" "${STAGE^^}"

          # shellcheck disable=SC1091
          source "${DEVSECOPS_SCRIPT_LIBRARY_DIR}/dynamic-scan/start-zap-scans.sh"
        include:
