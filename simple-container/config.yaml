      - name: static-scan
        image: icr.io/continuous-delivery/pipeline/pipeline-base-ubi:3.61
        onError: continue
        script: *static-scan
        include:
          - docker-socket
      - name: detect-secrets
        include:
          - docker-socket
    include:
      - dind
